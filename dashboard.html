<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Dashboard</title>
</head>
<body class="bg-gray-950 text-gray-200 p-8">

  <main class="max-w-6xl mx-auto bg-gray-900 shadow-2xl rounded-2xl overflow-hidden border border-purple-800">

    <div class="p-6 border-b border-purple-800 bg-gray-900">
      <h2 class="text-2xl font-bold text-purple-400">Lista de Alunos</h2>
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full">

        <thead class="bg-purple-900/40 text-purple-300 uppercase text-xs tracking-wider">
          <tr>
            <th class="px-6 py-3 text-left">Nome</th>
            <th class="px-6 py-3 text-left">Matrícula</th>
            <th class="px-6 py-3 text-left">Curso</th>
            <th class="px-6 py-3 text-left">Idade</th>
            <th class="px-6 py-3 text-left">Status</th>
          </tr>
        </thead>

        <tbody id="tabela" class="text-sm">
        </tbody>

      </table>
    </div>

  </main>

  <script src="./js/dashboard.js"></script>
</body>
</html>
