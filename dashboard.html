<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>Dashboard</title>
</head>
<body class="bg-gray-950 text-gray-200 p-8 h-screen">

  <main class="max-w-6xl mx-auto  shadow-2xl rounded-2xl overflow-hidden border-none">

    <div class="p-6 border-b border-none flex justify-between">
      <h1 class="text-3xl font-bold mb-6 bg-gradient-to-r from-purple-500 to-violet-400 bg-clip-text text-transparent">
        Alunos Matriculados
      </h1>
      <button class="btn btn-outline btn-primary">Adicionar aluno</button>
    </div>

    <div class="bg-[#111827] rounded-2xl shadow-2xl border border-purple-900/40 overflow-hidden overflow-x-auto ">
      <table class="min-w-full">

        <thead>
          <tr class="grid grid-cols-6 px-8 py-4 text-sm text-gray-400 border-b border-purple-900/30 bg-gradient-to-r from-[#111827] to-purple-900/20">
            <th class="px-6 py-3 text-left">Nome</th>
            <th class="px-6 py-3 text-left">Matrícula</th>
            <th class="px-6 py-3 text-left">Curso</th>
            <th class="px-6 py-3 text-left">Idade</th>
            <th class="px-6 py-3 text-left">Status</th>
          </tr>
        </thead>

        <tbody id="tabela" class="text-sm">
        </tbody>

      </table>
    </div>

  </main>

  <script src="./js/dashboard.js"></script>
</body>
</html>
